services:
  nova-api:
    build:
      context: ./backend_python
      dockerfile: Dockerfile
    ports:
      - "${NOVA_API_PORT:-8000}:${NOVA_API_PORT:-8000}"  # Acesse via NOVA_API_PORT (padrão 8000)
    environment:
      - NOVA_ADMIN_USER=admin
      - NOVA_ADMIN_PASSWORD=senha_forte_mude_apos_deploy!
      - PORT=${NOVA_API_PORT:-8000}
      - NOVA_API_PORT=${NOVA_API_PORT:-8000}
    volumes:
      - ./backend_python/data:/app/data  # Persistência memória/aprendizado
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; port=os.getenv('PORT', os.getenv('NOVA_API_PORT', '8000')); urllib.request.urlopen(f'http://localhost:{port}/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  nova_data:
