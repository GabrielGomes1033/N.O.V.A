name: windows-release

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter dependencies
        run: |
          cd frontend_flutter
          flutter pub get

      - name: Build Windows EXE (frontend)
        run: |
          cd frontend_flutter
          flutter config --enable-windows-desktop
          flutter build windows --release --dart-define=NOVA_API_URL=https://chatbot-tagq.onrender.com

      - name: Pack frontend artifact
        shell: pwsh
        run: |
          $src = "frontend_flutter\build\windows\x64\runner\Release"
          $dst = "nova-frontend-windows.zip"
          if (!(Test-Path $src)) { throw "Pasta de build não encontrada: $src" }
          Compress-Archive -Path "$src\*" -DestinationPath $dst -Force

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build backend EXE (PyInstaller)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend_python/requirements.txt
          pip install pyinstaller
          pyinstaller --onefile --name nova-backend backend_python/api_server.py

      - name: Upload frontend exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-frontend-windows
          path: nova-frontend-windows.zip

      - name: Upload backend exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-backend-windows
          path: dist/nova-backend.exe
