name: nova-ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend_python/requirements.txt
      - name: Backend syntax check
        run: |
          python -m compileall -q backend_python
      - name: Backend format check
        working-directory: backend_python
        run: |
          python -m black --check api/app.py api/dependencies.py api/routes_location.py core/logger.py models/schemas.py tests/test_api.py
      - name: Backend type check
        working-directory: backend_python
        run: |
          python -m mypy
      - name: Backend tests
        working-directory: backend_python
        env:
          PYTHONPATH: .
        run: |
          python -m pytest tests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Flutter pub get
        run: |
          cd frontend_flutter
          flutter pub get
      - name: Flutter analyze
        run: |
          cd frontend_flutter
          flutter analyze
